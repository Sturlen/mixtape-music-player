services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - data:/data
      - /mnt/plex/Library/demo:/data/demo
      - /mnt/plex/Library/mp3:/data/mp3
    ports:
      - "3001:3000"
    restart: unless-stopped
    environment:
      - MUSIC_PATH=/data/demo
      - MUSIC2_PATH=/data/mp3
      - GRAFANA_TOKEN
      - OTEL_EXPORTER_OTLP_ENDPOINT
      - DATA_PATH=/data

volumes:
  data: {}
